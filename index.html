<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>簡易食譜分享平台 (手動同步穩定版)</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --dark-color: #2d3436;
            --light-color: #f9f9f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #f5f6fa; color: var(--dark-color); padding: 20px; }
        header { text-align: center; margin-bottom: 25px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        header h1 { color: var(--primary-color); margin-bottom: 15px; font-size: 26px; }
        
        .mode-switcher { display: flex; justify-content: center; gap: 15px; }
        .mode-btn { background-color: #b2bec3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; font-weight: bold; }
        .mode-btn.active { background-color: var(--primary-color); }
        
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .container.active { display: block; }
        
        .field { margin-bottom: 15px; }
        .field label { display: block; margin-bottom: 6px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 15px; }
        textarea { height: 80px; resize: vertical; }
        
        .btn { padding: 12px; width: 100%; background: var(--secondary-color); border: none; color: white; font-size: 16px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        
        .clickable-item { background: #e8f8f5; padding: 12px; margin-top: 6px; border-left: 5px solid var(--secondary-color); cursor: pointer; font-weight: bold; border-radius: 0 5px 5px 0; transition: 0.2s; }
        .clickable-item:hover { background: #d1f2eb; }
        
        .card { border: 1px solid #eee; border-radius: 8px; padding: 20px; margin-top: 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .recipe-ingredients { background: var(--light-color); padding: 15px; border-radius: 5px; border-left: 5px solid var(--primary-color); white-space: pre-wrap; line-height: 1.5; }
        
        .admin-section-2 { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .admin-table th { background: #f8f9fa; color: #555; font-weight: bold; }
        .act-btn { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; font-weight: bold; margin-right: 5px; font-size: 13px; }
        .edit-btn { background: #3498db; }
        .del-btn { background: #e74c3c; }
        .badge { background: #e17055; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 10px; }
        
        .sync-box { background: #f1f2f6; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #ced6e0; }
        .sync-btn { background-color: #2ed573; padding: 8px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>🍳 簡易食譜分享平台</h1>
        <div class="mode-switcher">
            <button id="tab-user-btn" class="mode-btn active" onclick="changePage('user')">👤 使用者模式</button>
            <button id="tab-admin-btn" class="mode-btn" onclick="changePage('admin')">🔑 管理員模式</button>
        </div>
    </header>
    <!-- ================= 使用者畫面 ================= -->
    <div id="view-user" class="container active">
        <h2>👤 使用者搜尋模式</h2>
        <hr style="border: 0; height: 1px; background: #eee; margin: 15px 0;">
        
        <div class="field">
            <label>🔍 請選擇搜尋方式：</label>
            <select id="search-mode-select" onchange="switchSearchMode()">
                <option value="cat">類別</option>
                <option value="name">菜式</option>
            </select>
        </div>

        <div id="area-cat" class="field">
            <label>▼ 請選擇食譜類別：</label>
            <select id="sel-cat" onchange="searchByCategory()"></select>
            <div id="panel-cat-list" style="margin-top: 10px;"></div>
        </div>

        <div id="area-name" class="field hidden">
            <label>▼ 請選擇菜式名稱：</label>
            <select id="sel-name" onchange="searchByName()"></select>
        </div>

        <div id="content-display"></div>
        
        <br><hr style="border: 0; height: 1px; background: #eee; margin: 15px 0;">

        <div class="field">
            <label>🌾 依食材搜尋適用食譜：</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="input-keyword" placeholder="請輸入食材（例如：雞蛋、雞肉）">
                <button onclick="searchByIngredient()" class="btn" style="width: auto; white-space: nowrap; background: #ff9f43;">搜尋食材</button>
            </div>
            <div id="panel-ing-list" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        var defaultData = [
            { name: "番茄炒蛋", category: "家常菜", ingredients: "番茄 2個\n雞蛋 3顆\n蔥花 少許" },
            { name: "咖哩雞肉", category: "異國料理", ingredients: "雞肉切塊\n馬鈴薯 1個\n咖哩塊\n洋蔥" }
        ];

        // 本機記憶體同步，100% 穩定，不依賴雲端
        var db = JSON.parse(localStorage.getItem("saved_recipes")) || defaultData;

        window.onload = function() {
            refreshDropdowns();
            refreshAdminTable();
        };

        function saveToLocalStorage() {
            localStorage.setItem("saved_recipes", JSON.stringify(db));
        }

        function changePage(mode) {
            document.getElementById('view-user').className = (mode === 'user') ? 'container active' : 'container';
            document.getElementById('view-admin').className = (mode === 'admin') ? 'container active' : 'container';
            document.getElementById('tab-user-btn').className = (mode === 'user') ? 'mode-btn active' : 'mode-btn';
            document.getElementById('tab-admin-btn').className = (mode === 'admin') ? 'mode-btn active' : 'mode-btn';
            if (mode === 'user') {
                resetToInsert();
                refreshDropdowns();
            } else {
                refreshAdminTable();
            }
        }

        function switchSearchMode() {
            var mode = document.getElementById('search-mode-select').value;
            document.getElementById('area-cat').className = (mode === 'cat') ? 'field' : 'field hidden';
            document.getElementById('area-name').className = (mode === 'name') ? 'field' : 'field hidden';
            
            document.getElementById('panel-cat-list').innerHTML = '';
            document.getElementById('content-display').innerHTML = '';
            document.getElementById('sel-cat').value = '';
            document.getElementById('sel-name').value = '';
        }

        function refreshDropdowns() {
            var cSelect = document.getElementById('sel-cat');
            var nSelect = document.getElementById('sel-name');
            cSelect.innerHTML = '<option value="">-- 請選擇類別 --</option>';
            nSelect.innerHTML = '<option value="">-- 請選擇菜式 --</option>';
            
            var cats = [];
            for (var i = 0; i < db.length; i++) {
                if (cats.indexOf(db[i].category) === -1) {
                    cats.push(db[i].category);
                }
                var optN = document.createElement('option');
                optN.value = i;
                optN.textContent = db[i].name;
                nSelect.appendChild(optN);
            }
            for (var j = 0; j < cats.length; j++) {
                var optC = document.createElement('option');
                optC.value = j;
                optC.textContent = cats[j];
                cSelect.appendChild(optC);
            }
        }

        function searchByCategory() {
            var selectEl = document.getElementById('sel-cat');
            if (selectEl.value === "") { document.getElementById('panel-cat-list').innerHTML = ''; return; }
            var targetCat = selectEl.options[selectEl.selectedIndex].text;
            var listPanel = document.getElementById('panel-cat-list');
            document.getElementById('content-display').innerHTML = '';
            
            var html = '<p style="color:#7f8c8d; font-size:14px; margin:5px 0;">請點擊下方菜式名稱展開完整內容：</p>';
            for (var i = 0; i < db.length; i++) {
                if (db[i].category === targetCat) {
                    html += '<div class="clickable-item" onclick="showFinalContent(' + i + ')">▪ ' + db[i].name + '</div>';
                }
            }
            listPanel.innerHTML = html;
        }

        function searchByName() {
            var idx = document.getElementById('sel-name').value;
            if (idx === "") { document.getElementById('content-display').innerHTML = ""; return; }
            showFinalContent(parseInt(idx));
        }

        function searchByIngredient() {
            var kw = document.getElementById('input-keyword').value.trim().toLowerCase();
            var panel = document.getElementById('panel-ing-list');
            if (kw === "") { alert("請輸入食材關鍵字！"); return; }
            
            var html = "";
            var count = 0;
            for (var i = 0; i < db.length; i++) {
                if (db[i].ingredients.toLowerCase().indexOf(kw) !== -1) {
                    html += '<div class="clickable-item" onclick="showFinalContent(' + i + ')"><b>' + db[i].name + '</b> <span style="font-size:13px; font-weight:normal; color:#666;">[' + db[i].category + ']</span></div>';
                    count++;
                }
            }
            if (count === 0) {
                panel.innerHTML = '<p style="color:#e74c3c; margin-top:5px; font-weight:bold;">找不到包含該食材的食譜。</p>';
            } else {
                panel.innerHTML = '<p style="color:#d35400; font-size:14px; margin:5px 0; font-weight:bold;">▼ 找到 ' + count + ' 個適用食譜，點擊展開內容：</p>' + html;
            }
        }

        function showFinalContent(index) {
            var recipe = db[index];
            var panel = document.getElementById('content-display');
            
            panel.innerHTML = '<div class="card">' +
                '<h3 style="margin-bottom:5px; color:#2d3436; border-bottom:2px solid var(--primary-color); padding-bottom:5px;">' + recipe.name + '</h3>' +
                '<div class="recipe-meta" style="margin-top:5px;">食譜類別：' + recipe.category + '</div>' +
                '<div class="recipe-ingredients" style="margin-top:10px;">' +
                    '<strong>🛒 所需食材資料：</strong><br><div style="margin-top:5px;">' + recipe.ingredients + '</div>' +
                '</div>' +
            '</div>';
            panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
    <!-- ================= 管理員畫面 ================= -->
    <div id="view-admin" class="container">
        <h2>🔑 管理員管理後台</h2>
        <hr style="border: 0; height: 1px; background: #eee; margin: 15px 0;">
        
        <div id="form-status-area" style="display:none;">
            <span class="badge">🔄 您正在編輯現有食譜</span>
            <button type="button" onclick="resetToInsert()" style="float:right; cursor:pointer; background:none; border:none; color:#3498db; font-weight:bold;">取消修改改為新增</button>
        </div>
        <h3 id="form-head">【第一部分】新增食譜資料</h3>
        
        <form onsubmit="saveData(event)" style="margin-top:15px;">
            <input type="hidden" id="form-index" value="-1">
            <div class="field">
                <label>食譜名稱 (菜式)</label>
                <input type="text" id="form-name" required placeholder="例如：番茄炒蛋">
            </div>
            <div class="field">
                <label>食譜類別 (類別)</label>
                <input type="text" id="form-cat" required placeholder="例如：家常菜">
            </div>
            <div class="field">
                <label>食材資料 (請用分行隔開)</label>
                <textarea id="form-ing" required placeholder="例如：番茄2個&#10;雞蛋3顆"></textarea>
            </div>
            <button type="submit" id="form-submit-btn" class="btn" style="background: var(--primary-color);">💾 點擊儲存食譜</button>
        </form>

        <div class="admin-section-2">
            <h3>【第二部分】所有食譜清單與跨裝置同步</h3>
            
            <div class="sync-box" style="margin-top: 15px;">
                <p style="font-weight: bold; margin-bottom: 8px; font-size:14px; color:#2f3542;">📱 手機/電腦資料手動同步：</p>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                    <button type="button" onclick="exportData()" class="sync-btn" style="background-color: #57606f;">📥 匯出備份檔案</button>
                    <div style="border-left: 1px solid #ccc; height: 25px; margin: 0 5px;"></div>
                    <!-- 🛠️ 已修正：移除檔案類型過濾，確保 Android 手機端可以正常點選檔案匯入 -->
                    <input type="file" id="import-file" style="width: auto; font-size: 12px; border: none; padding: 0;">
                    <button type="button" onclick="importData()" class="sync-btn">📤 匯入備份檔案</button>
                </div>
            </div>

            <table class="admin-table">
                <thead>
                    <tr><th style="width: 50%;">食譜名稱 (菜式)</th><th style="width: 30%;">類別</th><th style="width: 20%;">操作</th></tr>
                </thead>
                <tbody id="admin-table-rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        function exportData() {
            if (db.length === 0) { alert("目前沒有食譜資料可匯出！"); return; }
            var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            var downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "食譜資料備份.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData() {
            var fileInput = document.getElementById('import-file');
            if (!fileInput.files || fileInput.files.length === 0) { alert("請先選取要匯入的備份檔案 (.json)！"); return; }
            
            var file = fileInput.files[0];
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        if (confirm("匯入備份會覆蓋目前此裝置上的食譜資料，確定要匯入嗎？")) {
                            db = importedData;
                            saveToLocalStorage();
                            refreshAdminTable();
                            fileInput.value = '';
                            alert("資料匯入成功！已成功與另一台裝置同步。");
                        }
                    } else { alert("檔案內容格式不正確，匯入失敗。"); }
                } catch (err) { alert("無法讀取此檔案，請確認是否為正確的食譜備份檔。"); }
            };
            reader.readAsText(file);
        }

        function refreshAdminTable() {
            var tbody = document.getElementById('admin-table-rows');
            tbody.innerHTML = '';
            if (db.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#aaa;">目前沒有任何食譜資料</td></tr>';
                return;
            }
            for (var i = 0; i < db.length; i++) {
                var row = document.createElement('tr');
                row.innerHTML = '<td><b>' + db[i].name + '</b></td>' +
                    '<td>' + db[i].category + '</td>' +
                    '<td>' +
                        '<button onclick="startEdit(' + i + ')" class="act-btn edit-btn">✏️ 編輯</button>' +
                        '<button onclick="deleteData(' + i + ')" class="act-btn del-btn">🗑️</button>' +
                    '</td>';
                tbody.appendChild(row);
            }
        }

        function startEdit(index) {
            var recipe = db[index];
            document.getElementById('form-index').value = index;
            document.getElementById('form-name').value = recipe.name;
            document.getElementById('form-cat').value = recipe.category;
            document.getElementById('form-ing').value = recipe.ingredients;
            
            document.getElementById('form-head').textContent = '【第一部分】修改現有食譜資料';
            document.getElementById('form-submit-btn').textContent = '確認更新食譜內容';
            document.getElementById('form-submit-btn').style.background = '#3498db';
            document.getElementById('form-status-area').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetToInsert() {
            document.getElementById('form-index').value = '-1';
            document.getElementById('form-name').value = '';
            document.getElementById('form-cat').value = '';
            document.getElementById('form-ing').value = '';
            
            document.getElementById('form-head').textContent = '【第一部分】新增食譜資料';
            document.getElementById('form-submit-btn').textContent = '💾 點擊儲存食譜';
            document.getElementById('form-submit-btn').style.background = 'var(--primary-color)';
            document.getElementById('form-status-area').style.display = 'none';
        }

        function saveData(event) {
            event.preventDefault();
            var idx = parseInt(document.getElementById('form-index').value);
            var name = document.getElementById('form-name').value.trim();
            var cat = document.getElementById('form-cat').value.trim();
            var ing = document.getElementById('form-ing').value.trim();

            var item = { name: name, category: cat, ingredients: ing };

            if (idx === -1) {
                db.push(item);
                alert('食譜儲存成功！已即時同步至使用者搜尋模式。');
            } else {
                db[idx] = item;
                alert('食譜修改成功！已即時同步至使用者搜尋模式。');
                resetToInsert();
            }
            saveToLocalStorage();
            refreshAdminTable();
        }

        function deleteData(index) {
            if (confirm('確定要刪除「' + db[index].name + '」這個食譜嗎？')) {
                db.splice(index, 1);
                resetToInsert();
                saveToLocalStorage();
                refreshAdminTable();
            }
        }
    </script>
</body>
</html>
